name: Lint LaTeX

# Runs chktex on every PR. Advisory only — does not block merge.

on:
  pull_request:
    paths: ['**.tex']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  chktex:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Run chktex on every .tex file
        run: |
          docker run --rm -v "$PWD":/work -w /work \
            texlive/texlive:TL2025-historic \
            sh -c 'find . -name "*.tex" -not -path "./.git/*" -print0 | xargs -0 chktex -q'
