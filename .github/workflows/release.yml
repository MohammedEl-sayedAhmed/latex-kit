name: Release PDF

# Tag a commit `v*` (e.g. `git tag v1.0 && git push --tags`) to publish a
# GitHub Release with the built PDF attached.

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build with TeX Live 2025-historic
        run: |
          docker run --rm -v "$PWD":/work -w /work \
            texlive/texlive:TL2025-historic \
            latexmk -pdf -interaction=nonstopmode -file-line-error main.tex

      - name: Rename PDF with tag
        run: mv main.pdf "main-${{ github.ref_name }}.pdf"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            "main-${{ github.ref_name }}.pdf" \
            --generate-notes
